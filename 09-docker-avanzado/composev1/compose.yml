services:
  web1:
    container_name: web1
    image: nginx:alpine
    depends_on:
      - db
    ports:
      - "8081:80"
    volumes:
      - ./html:/usr/share/nginx/html

  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  web2:
    container_name: web2
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - my_network
  web3:
    container_name: web3
    image: nginx:alpine
    ports:
      - "8083:80"
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - my_network

volumes:
  db_data:

networks:
  my_network:
    driver: bridge